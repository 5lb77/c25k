<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C25K Timer</title>
  <style>
    /* === Reset & base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* === Picker view === */
    #picker { display: flex; flex-direction: column; align-items: center; width: 100%; }
    #picker.hidden { display: none; }

    /* === Timer view === */
    #timer { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; }
    #timer.active { display: flex; }
  </style>
</head>
<body>

  <!-- Picker view -->
  <div id="picker">
    <p>Picker goes here</p>
  </div>

  <!-- Timer view -->
  <div id="timer">
    <p>Timer goes here</p>
  </div>

  <script>
    // JS goes here
  </script>
</body>
</html>
