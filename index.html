<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C25K Timer</title>
  <style>
    /* === Reset & base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* === Picker view === */
    #picker { display: flex; flex-direction: column; align-items: center; width: 100%; }
    #picker.hidden { display: none; }

    /* === Timer view === */
    #timer { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; }
    #timer.active { display: flex; }

    /* === Picker card === */
    .picker-card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      align-items: center;
    }

    .picker-card h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .picker-sub {
      color: #888;
      font-size: 0.9rem;
      margin-top: -0.75rem;
    }

    .picker-row {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .picker-row label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    .picker-row select {
      background: #2a2a2a;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      width: 100%;
      appearance: none;
      cursor: pointer;
    }

    #start-btn {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.9rem;
      background: #e85d04;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #start-btn:hover { background: #f48c06; }
  </style>
</head>
<body>

  <!-- Picker view -->
  <div id="picker">
    <div class="picker-card">
      <h1>C25K Timer</h1>
      <p class="picker-sub">Couch to 5K — 9 Week Plan</p>

      <div class="picker-row">
        <label for="week-select">Week</label>
        <select id="week-select"></select>
      </div>

      <div class="picker-row">
        <label for="day-select">Day</label>
        <select id="day-select"></select>
      </div>

      <button id="start-btn" onclick="startWorkout()">Start Workout</button>
    </div>
  </div>

  <!-- Timer view -->
  <div id="timer">
    <p>Timer goes here</p>
  </div>

  <script>
    const SCHEDULE = [
  // Week 1 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 8 }, () => [
      { type: 'run',  duration: 60 },
      { type: 'walk', duration: 90 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 2 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 6 }, () => [
      { type: 'run',  duration: 90 },
      { type: 'walk', duration: 120 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 3 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 2 }, () => [
      { type: 'run',  duration: 90 },
      { type: 'walk', duration: 90 },
      { type: 'run',  duration: 180 },
      { type: 'walk', duration: 180 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 4 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 180 },
    { type: 'walk', duration: 90 },
    { type: 'run',  duration: 300 },
    { type: 'walk', duration: 150 },
    { type: 'run',  duration: 180 },
    { type: 'walk', duration: 90 },
    { type: 'run',  duration: 300 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 5, Day 1
  [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 3 }, () => [
      { type: 'run',  duration: 300 },
      { type: 'walk', duration: 180 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ],

  // Week 5, Day 2
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 480 },
    { type: 'walk', duration: 300 },
    { type: 'run',  duration: 480 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 5, Day 3
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1200 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 1
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 300 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 480 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 300 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 2
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 600 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 600 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 3
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1320 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 7 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1500 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 8 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1680 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 9 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1800 },
    { type: 'cooldown', duration: 300 },
  ]),
];
// SCHEDULE is a flat array of 27 sessions (index 0 = W1D1, index 26 = W9D3)
// getSession(week, day) where week and day are 1-indexed:
function getSession(week, day) {
  return SCHEDULE[(week - 1) * 3 + (day - 1)];
}

const WEEK_LABELS = Array.from({ length: 9 }, (_, i) => `Week ${i + 1}`);
const DAY_LABELS = [
  ['Day 1', 'Day 2', 'Day 3'],               // weeks 1-4, 6-9
  ['Day 1', 'Day 2', 'Day 3 — 20 min run'],  // week 5
];

function populatePicker() {
  const weekSel = document.getElementById('week-select');
  const daySel  = document.getElementById('day-select');

  WEEK_LABELS.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = i + 1;
    opt.textContent = label;
    weekSel.appendChild(opt);
  });

  weekSel.addEventListener('change', () => updateDayOptions());
  updateDayOptions();
}

function updateDayOptions() {
  const week = parseInt(document.getElementById('week-select').value);
  const daySel = document.getElementById('day-select');
  daySel.innerHTML = '';
  const labels = week === 5 ? DAY_LABELS[1] : DAY_LABELS[0];
  labels.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = i + 1;
    opt.textContent = label;
    daySel.appendChild(opt);
  });
}

function showPicker() {
  document.getElementById('picker').classList.remove('hidden');
  document.getElementById('timer').classList.remove('active');
}

function startWorkout() {
  const week = parseInt(document.getElementById('week-select').value);
  const day  = parseInt(document.getElementById('day-select').value);
  initTimer(week, day); // defined in Task 5
  document.getElementById('picker').classList.add('hidden');
  document.getElementById('timer').classList.add('active');
}

populatePicker();
  </script>
</body>
</html>
