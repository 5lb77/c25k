<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C25K Timer</title>
  <style>
    /* === Reset & base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* === Picker view === */
    #picker { display: flex; flex-direction: column; align-items: center; width: 100%; }
    #picker.hidden { display: none; }

    /* === Timer view === */
    #timer { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; justify-content: space-between; padding: 1rem; }
    #timer.active { display: flex; }

    /* === Picker card === */
    .picker-card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      align-items: center;
    }

    .picker-card h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .picker-sub {
      color: #888;
      font-size: 0.9rem;
      margin-top: -0.75rem;
    }

    .picker-row {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .picker-row label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    .picker-row select {
      background: #2a2a2a;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      width: 100%;
      appearance: none;
      cursor: pointer;
    }

    #start-btn {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.9rem;
      background: #e85d04;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #start-btn:hover { background: #f48c06; }

    /* === Timer layout === */
    .timer-topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
    }

    .back-btn, .mute-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.4rem 0.6rem;
    }

    .back-btn:hover, .mute-btn:hover { color: #f0f0f0; }

    #session-label {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    /* === Timer main === */
    .timer-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 100%;
    }

    .interval-label {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .countdown {
      font-size: 20vw;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .progress-bar-track {
      width: 90%;
      max-width: 400px;
      height: 6px;
      background: #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.9s linear;
    }

    .up-next {
      font-size: 0.9rem;
      color: #888;
    }

    /* === Controls === */
    .timer-controls {
      width: 100%;
      display: flex;
      gap: 0.75rem;
      padding: 1rem 0 2rem;
    }

    .btn-primary {
      flex: 2;
      padding: 1rem;
      background: #e85d04;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #f48c06; }

    .btn-secondary {
      flex: 1;
      padding: 1rem;
      background: #2a2a2a;
      color: #f0f0f0;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #333; }

    /* === Completion message === */
    .complete-msg {
      position: absolute;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .complete-msg .btn-primary { width: 60%; }

    /* === Utility === */
    .hidden { display: none !important; }

    /* === Interval accent colors === */
    .accent-warmup   { color: #f4a261; }
    .accent-run      { color: #e85d04; }
    .accent-walk     { color: #4a9eff; }
    .accent-cooldown { color: #52b788; }

    .bar-warmup   { background: #f4a261; }
    .bar-run      { background: #e85d04; }
    .bar-walk     { background: #4a9eff; }
    .bar-cooldown { background: #52b788; }
  </style>
</head>
<body>

  <!-- Picker view -->
  <div id="picker">
    <div class="picker-card">
      <h1>C25K Timer</h1>
      <p class="picker-sub">Couch to 5K — 9 Week Plan</p>

      <div class="picker-row">
        <label for="week-select">Week</label>
        <select id="week-select"></select>
      </div>

      <div class="picker-row">
        <label for="day-select">Day</label>
        <select id="day-select"></select>
      </div>

      <button id="start-btn" onclick="startWorkout()">Start Workout</button>
    </div>
  </div>

  <!-- Timer view -->
  <div id="timer">
    <div class="timer-topbar">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <span id="session-label">Week 1 · Day 1</span>
      <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔔</button>
    </div>

    <div class="timer-main">
      <div id="interval-label" class="interval-label">WARM UP</div>
      <div id="countdown" class="countdown">05:00</div>
      <div class="progress-bar-track">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>
      <div id="up-next" class="up-next">Up next: Run — 60s</div>
    </div>

    <div class="timer-controls">
      <button id="reset-btn" class="btn-secondary" onclick="resetTimer()">Reset</button>
      <button id="play-btn" class="btn-primary" onclick="togglePlay()">Start</button>
    </div>

    <div id="complete-msg" class="complete-msg hidden">
      <p>Done! Great run.</p>
      <button class="btn-primary" onclick="goBack()">Back to Menu</button>
    </div>
  </div>

  <script>
    const SCHEDULE = [
  // Week 1 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 8 }, () => [
      { type: 'run',  duration: 60 },
      { type: 'walk', duration: 90 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 2 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 6 }, () => [
      { type: 'run',  duration: 90 },
      { type: 'walk', duration: 120 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 3 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 2 }, () => [
      { type: 'run',  duration: 90 },
      { type: 'walk', duration: 90 },
      { type: 'run',  duration: 180 },
      { type: 'walk', duration: 180 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 4 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 180 },
    { type: 'walk', duration: 90 },
    { type: 'run',  duration: 300 },
    { type: 'walk', duration: 150 },
    { type: 'run',  duration: 180 },
    { type: 'walk', duration: 90 },
    { type: 'run',  duration: 300 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 5, Day 1
  [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 3 }, () => [
      { type: 'run',  duration: 300 },
      { type: 'walk', duration: 180 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ],

  // Week 5, Day 2
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 480 },
    { type: 'walk', duration: 300 },
    { type: 'run',  duration: 480 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 5, Day 3
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1200 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 1
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 300 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 480 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 300 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 2
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 600 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 600 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 3
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1320 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 7 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1500 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 8 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1680 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 9 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1800 },
    { type: 'cooldown', duration: 300 },
  ]),
];
// SCHEDULE is a flat array of 27 sessions (index 0 = W1D1, index 26 = W9D3)
// getSession(week, day) where week and day are 1-indexed:
function getSession(week, day) {
  return SCHEDULE[(week - 1) * 3 + (day - 1)];
}

const WEEK_LABELS = Array.from({ length: 9 }, (_, i) => `Week ${i + 1}`);
const DAY_LABELS = [
  ['Day 1', 'Day 2', 'Day 3'],               // weeks 1-4, 6-9
  ['Day 1', 'Day 2', 'Day 3 — 20 min run'],  // week 5
];

function populatePicker() {
  const weekSel = document.getElementById('week-select');
  const daySel  = document.getElementById('day-select');

  WEEK_LABELS.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = i + 1;
    opt.textContent = label;
    weekSel.appendChild(opt);
  });

  weekSel.addEventListener('change', () => updateDayOptions());
  updateDayOptions();
}

function updateDayOptions() {
  const week = parseInt(document.getElementById('week-select').value);
  const daySel = document.getElementById('day-select');
  daySel.innerHTML = '';
  const labels = week === 5 ? DAY_LABELS[1] : DAY_LABELS[0];
  labels.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = i + 1;
    opt.textContent = label;
    daySel.appendChild(opt);
  });
}

function showPicker() {
  document.getElementById('picker').classList.remove('hidden');
  document.getElementById('timer').classList.remove('active');
}

function startWorkout() {
  const week = parseInt(document.getElementById('week-select').value);
  const day  = parseInt(document.getElementById('day-select').value);
  initTimer(week, day); // defined in Task 5
  document.getElementById('picker').classList.add('hidden');
  document.getElementById('timer').classList.add('active');
}

let soundSettings = { style: 'sine', volume: 0.5 };

function loadSoundSettings() {
  try {
    const stored = localStorage.getItem('c25k_sound');
    if (stored) {
      const parsed = JSON.parse(stored);
      if (typeof parsed.volume === 'number') soundSettings.volume = parsed.volume;
      if (typeof parsed.style === 'string') soundSettings.style = parsed.style;
    }
  } catch (e) {}
}

function saveSoundSettings() {
  try {
    localStorage.setItem('c25k_sound', JSON.stringify(soundSettings));
  } catch (e) {}
}

populatePicker();
loadSoundSettings();

// Returns "60s" for <=90s, "2 min" for anything longer
function formatDuration(seconds) {
  if (seconds <= 90) return `${seconds}s`;
  return `${Math.round(seconds / 60)} min`;
}

// Returns "MM:SS" for the countdown clock
function formatCountdown(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

let session         = [];   // array of { type, duration }
let intervalIdx     = 0;    // index into session
let remaining       = 0;    // seconds left in current interval
let totalDuration   = 0;    // total session seconds (for progress bar)
let elapsed         = 0;    // seconds elapsed in total session
let playing         = false;
let ticker          = null; // setInterval handle
let startedAt       = null; // Date.now() at last resume (for drift correction)
let muted           = false;
let remainingAtResume   = 0;
let elapsedAtResume     = 0;
let warnedThisInterval  = false;
let wakeLock            = null;

const ACCENT_CLASSES  = { warmup: 'accent-warmup', run: 'accent-run', walk: 'accent-walk', cooldown: 'accent-cooldown' };
const BAR_CLASSES     = { warmup: 'bar-warmup',    run: 'bar-run',    walk: 'bar-walk',    cooldown: 'bar-cooldown'    };
const INTERVAL_LABELS = { warmup: 'WARM UP', run: 'RUN', walk: 'WALK', cooldown: 'COOL DOWN' };

function initTimer(week, day) {
  session       = getSession(week, day);
  totalDuration = session.reduce((sum, s) => sum + s.duration, 0);
  intervalIdx   = 0;
  elapsed       = 0;
  remaining     = session[0].duration;
  playing       = false;
  remainingAtResume  = 0;
  elapsedAtResume    = 0;
  warnedThisInterval = false;
  clearInterval(ticker);
  ticker        = null;

  document.getElementById('session-label').textContent = `Week ${week} · Day ${day}`;
  document.getElementById('complete-msg').classList.add('hidden');
  document.getElementById('play-btn').textContent = 'Start';
  renderInterval();
}

function renderInterval() {
  const seg = session[intervalIdx];

  // Interval label + color
  const label = document.getElementById('interval-label');
  label.textContent = INTERVAL_LABELS[seg.type];
  label.className = 'interval-label ' + ACCENT_CLASSES[seg.type];

  // Countdown
  document.getElementById('countdown').textContent = formatCountdown(remaining);

  // Progress bar
  const pct = totalDuration > 0 ? (elapsed / totalDuration) * 100 : 0;
  const bar = document.getElementById('progress-bar');
  bar.style.width = pct + '%';
  bar.className = 'progress-bar-fill ' + BAR_CLASSES[seg.type];

  // Up next
  const next = session[intervalIdx + 1];
  const upNextEl = document.getElementById('up-next');
  if (next) {
    upNextEl.textContent = `Up next: ${INTERVAL_LABELS[next.type]} — ${formatDuration(next.duration)}`;
  } else {
    upNextEl.textContent = 'Last interval!';
  }
}

function tick() {
  const now = Date.now();
  const secondsSinceResume = Math.floor((now - startedAt) / 1000);
  let currentRemaining = remainingAtResume - secondsSinceResume;

  if (currentRemaining <= 0) {
    // Credit this interval fully
    elapsed = elapsedAtResume + remainingAtResume;
    intervalIdx++;

    // Handle multi-interval skip (tab suspended, CPU delay)
    let overflow = -currentRemaining;
    while (overflow > 0 && intervalIdx < session.length) {
      if (overflow >= session[intervalIdx].duration) {
        elapsed += session[intervalIdx].duration;
        overflow -= session[intervalIdx].duration;
        intervalIdx++;
      } else {
        break;
      }
    }

    if (intervalIdx >= session.length) {
      finishWorkout();
      return;
    }

    // Start new interval
    remaining             = session[intervalIdx].duration - overflow;
    startedAt             = Date.now();
    remainingAtResume     = remaining;
    elapsedAtResume       = elapsed;
    warnedThisInterval    = false;
    playStartBeep();
  } else {
    remaining = currentRemaining;
    elapsed   = elapsedAtResume + secondsSinceResume;
    if (remaining <= 3 && !warnedThisInterval) {
      warnedThisInterval = true;
      playWarningBeep();
    }
  }

  renderInterval();
}

async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

function togglePlay() {
  if (playing) {
    clearInterval(ticker);
    ticker = null;
    playing = false;
    releaseWakeLock();
    document.getElementById('play-btn').textContent = 'Resume';
  } else {
    startedAt         = Date.now();
    remainingAtResume = remaining;
    elapsedAtResume   = elapsed;
    ticker = setInterval(tick, 1000);
    playing = true;
    acquireWakeLock();
    document.getElementById('play-btn').textContent = 'Pause';
  }
}

function resetTimer() {
  clearInterval(ticker);
  ticker   = null;
  playing  = false;
  const week = parseInt(document.getElementById('week-select').value);
  const day  = parseInt(document.getElementById('day-select').value);
  initTimer(week, day);
}

function goBack() {
  clearInterval(ticker);
  ticker  = null;
  playing = false;
  releaseWakeLock();
  showPicker();
}

function finishWorkout() {
  clearInterval(ticker);
  ticker  = null;
  playing = false;
  releaseWakeLock();
  playCompletionSequence();
  document.getElementById('complete-msg').classList.remove('hidden');
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && playing) {
    // Tab came back — run an immediate catch-up tick, then reset the resume anchor
    tick();
    if (playing) { // tick() may have called finishWorkout(), setting playing = false
      startedAt         = Date.now();
      remainingAtResume = remaining;
      elapsedAtResume   = elapsed;
      acquireWakeLock(); // wake lock is released automatically when page hides; re-acquire on return
    }
  }
});

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔔';
}

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      return null;
    }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(frequency, duration, volume = 0.4, type = 'sine') {
  if (muted) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.value = frequency;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
  osc.addEventListener('ended', () => osc.disconnect());
}

// Short double-beep warning — fires when remaining <= 3
function playWarningBeep() {
  playTone(880, 0.12, 0.3);
  setTimeout(() => playTone(880, 0.12, 0.3), 180);
}

// Single clean tone — fires at the start of a new interval
function playStartBeep() {
  playTone(660, 0.35, 0.5);
}

// Three ascending tones — workout complete
function playCompletionSequence() {
  playTone(523, 0.25, 0.5); // C5
  setTimeout(() => playTone(659, 0.25, 0.5), 300); // E5
  setTimeout(() => playTone(784, 0.4,  0.5), 600); // G5
}
  </script>
</body>
</html>
