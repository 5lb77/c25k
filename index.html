<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C25K Timer</title>
  <style>
    /* === Reset & base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* === Picker view === */
    #picker { display: flex; flex-direction: column; align-items: center; width: 100%; }
    #picker.hidden { display: none; }

    /* === Timer view === */
    #timer { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; }
    #timer.active { display: flex; }
  </style>
</head>
<body>

  <!-- Picker view -->
  <div id="picker">
    <p>Picker goes here</p>
  </div>

  <!-- Timer view -->
  <div id="timer">
    <p>Timer goes here</p>
  </div>

  <script>
    const SCHEDULE = [
  // Week 1 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 8 }, () => [
      { type: 'run',  duration: 60 },
      { type: 'walk', duration: 90 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 2 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 6 }, () => [
      { type: 'run',  duration: 90 },
      { type: 'walk', duration: 120 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 3 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 2 }, () => [
      { type: 'run',  duration: 90 },
      { type: 'walk', duration: 90 },
      { type: 'run',  duration: 180 },
      { type: 'walk', duration: 180 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 4 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 180 },
    { type: 'walk', duration: 90 },
    { type: 'run',  duration: 300 },
    { type: 'walk', duration: 150 },
    { type: 'run',  duration: 180 },
    { type: 'walk', duration: 90 },
    { type: 'run',  duration: 300 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 5, Day 1
  [
    { type: 'warmup',   duration: 300 },
    ...Array.from({ length: 3 }, () => [
      { type: 'run',  duration: 300 },
      { type: 'walk', duration: 180 },
    ]).flat(),
    { type: 'cooldown', duration: 300 },
  ],

  // Week 5, Day 2
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 480 },
    { type: 'walk', duration: 300 },
    { type: 'run',  duration: 480 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 5, Day 3
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1200 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 1
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 300 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 480 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 300 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 2
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 600 },
    { type: 'walk', duration: 180 },
    { type: 'run',  duration: 600 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 6, Day 3
  [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1320 },
    { type: 'cooldown', duration: 300 },
  ],

  // Week 7 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1500 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 8 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1680 },
    { type: 'cooldown', duration: 300 },
  ]),

  // Week 9 — same all 3 days
  ...[0,1,2].map(() => [
    { type: 'warmup',   duration: 300 },
    { type: 'run',  duration: 1800 },
    { type: 'cooldown', duration: 300 },
  ]),
];
// SCHEDULE is a flat array of 27 sessions (index 0 = W1D1, index 26 = W9D3)
// getSession(week, day) where week and day are 1-indexed:
function getSession(week, day) {
  return SCHEDULE[(week - 1) * 3 + (day - 1)];
}
  </script>
</body>
</html>
